<h2>Danh sách truyện tranh</h2>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>STT</th>
      <th>Hình ảnh</th>
      <th>Tên truyện</th>
      <th>Tác giả</th>
      <th>Lượt xem</th>
    </tr>
  </thead>

  <tbody>
    @for (story of stories; track story.title; let i = $index) {

    <tr>
      <td>{{ i + 1 }}</td>

      <td>
        <img [src]="story.image" width="80">
      </td>

      <td>{{ story.title }}</td>

      <td>{{ story.author }}</td>

      <td>
        {{ story.views }}

        @if (story.views > 80000) {
          🔥
        }
      </td>
    </tr>

    }

  </tbody>
</table>
